<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>견적 수주율 관리 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f5f3;
    --bg-tertiary: #eeece6;
    --bg-info: #e6f1fb;
    --text-primary: #1a1a18;
    --text-secondary: #6b6b67;
    --text-tertiary: #a0a09a;
    --text-info: #0c447c;
    --border: rgba(0,0,0,0.12);
    --border-hover: rgba(0,0,0,0.25);
    --radius-md: 8px;
    --radius-lg: 12px;
    --font: 'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1c1c1a;
      --bg-secondary: #252523;
      --bg-tertiary: #2e2e2b;
      --bg-info: #0c2440;
      --text-primary: #f0ede6;
      --text-secondary: #a0a09a;
      --text-tertiary: #6b6b67;
      --text-info: #85b7eb;
      --border: rgba(255,255,255,0.12);
      --border-hover: rgba(255,255,255,0.25);
    }
  }

  body { font-family: var(--font); background: var(--bg-tertiary); color: var(--text-primary); min-height: 100vh; }
  .app { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }
  .shell { background: var(--bg-primary); border-radius: var(--radius-lg); border: 0.5px solid var(--border); overflow: hidden; }

  /* Header */
  .header { padding: 1.25rem 1.5rem; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
  .header-left h1 { font-size: 17px; font-weight: 600; }
  .header-left p { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

  /* Tabs */
  .tab-bar { display: flex; gap: 0; padding: 0 1.5rem; border-bottom: 0.5px solid var(--border); overflow-x: auto; }
  .tab { padding: 12px 16px; font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; color: var(--text-secondary); white-space: nowrap; transition: all 0.15s; }
  .tab.active { color: var(--text-primary); border-bottom-color: var(--text-primary); font-weight: 500; }
  .tab:hover:not(.active) { color: var(--text-primary); }

  /* Content */
  .content { padding: 1.5rem; display: none; }
  .content.active { display: block; }

  /* Metrics */
  .metrics { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
  @media (max-width: 600px) { .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
  .metric { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 1rem; }
  .metric-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 5px; }
  .metric-value { font-size: 22px; font-weight: 600; }
  .metric-sub { font-size: 11px; color: var(--text-tertiary); margin-top: 3px; }
  .green { color: #3B6D11; } .amber { color: #854F0B; }
  @media (prefers-color-scheme: dark) { .green { color: #97C459; } .amber { color: #EF9F27; } }

  /* Two-col */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  @media (max-width: 700px) { .two-col { grid-template-columns: 1fr; } }

  /* Cards */
  .card { background: var(--bg-primary); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 1rem; }
  .card-pad { padding: 1rem; }
  .section-title { font-size: 13px; font-weight: 500; margin-bottom: 10px; }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { padding: 9px 12px; text-align: left; font-size: 11px; font-weight: 500; color: var(--text-secondary); border-bottom: 0.5px solid var(--border); background: var(--bg-secondary); white-space: nowrap; }
  td { padding: 10px 12px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg-secondary); }

  /* Badges */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .b-wait { background: #FAEEDA; color: #633806; }
  .b-quoted { background: #E6F1FB; color: #0C447C; }
  .b-won { background: #EAF3DE; color: #27500A; }
  .b-lost { background: #FCEBEB; color: #791F1F; }

  /* Buttons */
  .btn { padding: 7px 14px; border: 0.5px solid var(--border-hover); border-radius: var(--radius-md); background: transparent; cursor: pointer; font-size: 12px; color: var(--text-primary); font-family: var(--font); transition: background 0.15s; }
  .btn:hover { background: var(--bg-secondary); }
  .btn-primary { background: var(--text-primary); color: var(--bg-primary); border-color: var(--text-primary); }
  .btn-primary:hover { opacity: 0.85; }
  .btn-sm { padding: 4px 10px; font-size: 11px; }

  /* Notification dot */
  .dot { width: 6px; height: 6px; background: #E24B4A; border-radius: 50%; display: inline-block; margin-left: 5px; vertical-align: middle; }

  /* Modal */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; display: none; align-items: center; justify-content: center; padding: 1rem; }
  .overlay.open { display: flex; }
  .modal { background: var(--bg-primary); border-radius: var(--radius-lg); border: 0.5px solid var(--border); width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
  .modal-head { padding: 1.1rem 1.5rem; border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .modal-head h2 { font-size: 15px; font-weight: 500; }
  .modal-body { padding: 1.25rem 1.5rem; }
  .modal-foot { padding: 1rem 1.5rem; border-top: 0.5px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
  .x-btn { background: none; border: none; cursor: pointer; font-size: 20px; color: var(--text-secondary); line-height: 1; }

  /* Form */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  .form-full { grid-column: 1 / -1; }
  .fg { display: flex; flex-direction: column; gap: 5px; }
  .fg label { font-size: 11px; color: var(--text-secondary); font-weight: 500; }
  .fg input, .fg select, .fg textarea {
    border: 0.5px solid var(--border); border-radius: var(--radius-md);
    padding: 8px 10px; font-size: 13px; font-family: var(--font);
    background: var(--bg-primary); color: var(--text-primary);
  }
  .fg input:focus, .fg select:focus, .fg textarea:focus { outline: none; border-color: var(--border-hover); }
  .fg textarea { resize: vertical; min-height: 65px; }

  /* Filter bar */
  .filter-bar { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
  .filter-bar select { border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 6px 10px; font-size: 12px; background: var(--bg-primary); color: var(--text-primary); font-family: var(--font); }

  /* Status banner */
  .status-banner { background: var(--bg-info); border: 0.5px solid #b5d4f4; border-radius: var(--radius-md); padding: 9px 12px; font-size: 12px; color: var(--text-info); margin-top: 10px; display: none; align-items: center; gap: 7px; }
  .status-banner.show { display: flex; }

  /* Rep rows */
  .rep-row { display: flex; align-items: center; gap: 10px; padding: 11px 0; border-bottom: 0.5px solid var(--border); }
  .rep-row:last-child { border-bottom: none; }
  .avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
  .av-b { background: #B5D4F4; color: #0C447C; }
  .av-t { background: #9FE1CB; color: #085041; }
  .av-c { background: #F5C4B3; color: #712B13; }
  .rep-name { font-size: 13px; font-weight: 500; min-width: 50px; }
  .rep-meta { font-size: 11px; color: var(--text-secondary); flex: 1; display: flex; gap: 12px; }
  .rep-meta b { color: var(--text-primary); }
  .rate-wrap { min-width: 70px; text-align: right; }
  .rate-num { font-size: 13px; font-weight: 600; }
  .prog { width: 100%; height: 5px; background: var(--bg-secondary); border-radius: 3px; margin-top: 4px; overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 3px; background: #639922; }

  /* Recent list */
  .recent-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-bottom: 0.5px solid var(--border); font-size: 12px; }
  .recent-item:last-child { border-bottom: none; }

  /* Notification */
  .notif-item { padding: 10px 14px; border-bottom: 0.5px solid var(--border); }
  .notif-item:last-child { border-bottom: none; }
  .notif-item.unread { background: var(--bg-info); }
  .notif-text { font-size: 13px; display: flex; align-items: center; gap: 7px; }
  .notif-time { font-size: 11px; color: var(--text-tertiary); margin-top: 3px; padding-left: 13px; }

  /* Gmail badge */
  .gmail-badge { display: inline-flex; align-items: center; gap: 3px; padding: 2px 7px; border-radius: 10px; font-size: 10px; background: #FAECE7; color: #712B13; }

  /* Empty */
  .empty { padding: 2rem; text-align: center; color: var(--text-secondary); font-size: 13px; }

  /* Info box */
  .info-box { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 9px 12px; font-size: 12px; color: var(--text-secondary); margin-bottom: 12px; }

  /* Chart wrap */
  .chart-wrap { position: relative; width: 100%; }
</style>
</head>
<body>
<div class="app">
  <div class="shell">

    <div class="header">
      <div class="header-left">
        <h1>견적 수주율 관리 대시보드</h1>
        <p>어벤션 견적 관리 (데이터 동기화)</p>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <span id="pending-notif" style="display:none;font-size:12px;color:#854F0B;background:#FAEEDA;padding:5px 10px;border-radius:20px;"></span>
        <button class="btn btn-primary" onclick="openModal('inq-modal')">+ 견적 문의 등록</button>
        <button class="btn" onclick="loadDataFromSheet()">🔄 새로고침</button>
      </div>
    </div>

    <div class="tab-bar">
      <div class="tab active" onclick="switchTab('dashboard',this)">대시보드</div>
      <div class="tab" onclick="switchTab('inquiries',this)">견적 목록 <span id="pending-dot"></span></div>
      <div class="tab" onclick="switchTab('analytics',this)">분석</div>
    </div>

    <div id="tab-dashboard" class="content active">
      <div class="metrics" id="metrics"></div>
      <div class="two-col">
        <div>
          <div class="section-title">영업담당자별 수주율</div>
          <div class="card card-pad" id="rep-stats"></div>
        </div>
        <div>
          <div class="section-title">최근 견적 현황</div>
          <div class="card" id="recent-list"></div>
        </div>
      </div>
      <div class="section-title" style="margin-top:1rem;">월별 수주율 추이</div>
      <div class="card card-pad">
        <div class="chart-wrap" style="height:200px;"><canvas id="trend-chart"></canvas></div>
      </div>
    </div>

    <div id="tab-inquiries" class="content">
      <div class="filter-bar">
        <select id="f-rep" onchange="renderTable()"><option value="">전체 담당자</option><option>오지수</option><option>이승빈</option><option>박은주</option></select>
        <select id="f-status" onchange="renderTable()"><option value="">전체 상태</option><option>대기중</option><option>견적완료</option><option>수주</option><option>미수주</option></select>
        <span style="flex:1;"></span>
        <span id="table-count" style="font-size:12px;color:var(--text-secondary);"></span>
      </div>
      <div class="card table-wrap">
        <table>
          <thead><tr>
            <th>ID</th><th>문의일</th><th>담당자</th><th>고객사</th><th>Cat No.</th><th>제품명</th><th>CAS No.</th><th>Package</th><th>수량</th><th>금액</th><th>상태</th><th>액션</th>
          </tr></thead>
          <tbody id="inq-tbody"></tbody>
        </table>
      </div>
    </div>

    <div id="tab-analytics" class="content">
      <div class="two-col">
        <div>
          <div class="section-title">담당자별 수주 건수</div>
          <div class="card card-pad"><div class="chart-wrap" style="height:220px;"><canvas id="rep-chart"></canvas></div></div>
        </div>
        <div>
          <div class="section-title">전체 결과 현황</div>
          <div class="card card-pad"><div class="chart-wrap" style="height:220px;"><canvas id="result-chart"></canvas></div></div>
        </div>
      </div>
      <div class="section-title">담당자별 수주율 비교</div>
      <div class="card card-pad"><div class="chart-wrap" style="height:200px;"><canvas id="rate-chart"></canvas></div></div>
    </div>

  </div></div><div class="overlay" id="inq-modal">
  <div class="modal">
    <div class="modal-head"><h2>신규 견적 문의 등록</h2><button class="x-btn" onclick="closeModal('inq-modal')">×</button></div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="fg"><label>영업담당자</label><select id="i-rep"><option>오지수</option><option>이승빈</option><option>박은주</option></select></div>
        <div class="fg"><label>고객사</label><input id="i-customer" type="text" placeholder="고객사명"></div>
        <div class="fg"><label>Cat No.</label><input id="i-partno" type="text" placeholder="예: G7513"></div>
        <div class="fg"><label>제품명</label><input id="i-product" type="text" placeholder="제품명"></div>
        <div class="fg"><label>CAS No.</label><input id="i-casno" type="text" placeholder="예: 67-68-5"></div>
        <div class="fg"><label>Package</label><input id="i-pkg" type="text" placeholder="예: 500mL, 1g, 96well"></div>
        <div class="fg"><label>수량</label><input id="i-qty" type="text" placeholder="수량"></div>
      </div>
      <div id="inq-status" class="status-banner">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7L12 13 2 7"/></svg>
        <span id="inq-status-text"></span>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal('inq-modal')">취소</button>
      <button class="btn btn-primary" onclick="submitInquiry()">등록 (구매팀 자동메일 전송)</button>
    </div>
  </div>
</div>

<div class="overlay" id="quote-modal">
  <div class="modal">
    <div class="modal-head"><h2>견적 결과 입력</h2><button class="x-btn" onclick="closeModal('quote-modal')">×</button></div>
    <div class="modal-body">
      <div class="info-box" id="quote-info"></div>
      <div class="form-grid">
        <div class="fg"><label>견적 금액 (원)</label><input id="q-price" type="number" placeholder="0"></div>
        <div class="fg"><label>납기 가능일</label><input id="q-delivery" type="text" placeholder="예: 발주 후 2주"></div>
        <div class="fg"><label>공급사</label><input id="q-supplier" type="text" placeholder="공급사명"></div>
        <div class="fg"><label>결과</label>
          <select id="q-result"><option value="견적완료">견적완료 (결과 미정)</option><option value="수주">수주</option><option value="미수주">미수주</option></select>
        </div>
        <div class="fg form-full"><label>메모</label><textarea id="q-memo" placeholder="특이사항"></textarea></div>
      </div>
      <div id="quote-status" class="status-banner">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7L12 13 2 7"/></svg>
        <span id="quote-status-text"></span>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal('quote-modal')">취소</button>
      <button class="btn btn-primary" onclick="submitQuote()">저장 (영업담당자 자동메일 전송)</button>
    </div>
  </div>
</div>

<script>
// ❗ 필수 수정: Apps Script 배포 후 발급받은 웹 앱 URL을 아래에 붙여넣으세요.
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxAq3oko4Bjmb-lMFtEnyPWypnCLpbNg_iiK7Uw9y-1RP5GvAuPJXlfDFhwevSxkAbe/exec";

const STATUS_BADGE = { '대기중':'b-wait', '견적완료':'b-quoted', '수주':'b-won', '미수주':'b-lost' };
const AV = ['av-b','av-t','av-c'];

let inquiries = []; // 구글 시트에서 데이터를 불러와 저장할 배열
let quoteTarget = null;
const charts  = {};

// ── 데이터 로딩 (구글 시트 연동) ──────────────────────────────
async function loadDataFromSheet() {
  try {
    const response = await fetch(APPS_SCRIPT_URL);
    const data = await response.json();
    if(data) {
      inquiries = data;
      renderAll();
      if(document.getElementById('tab-inquiries').classList.contains('active')) renderTable();
    }
  } catch (error) {
    console.error("데이터 로딩 에러:", error);
  }
}

// ── Modal & Tabs ──────────────────────────────────────────────
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  document.getElementById('inq-status').classList.remove('show');
  document.getElementById('quote-status').classList.remove('show');
}
function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.content').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='inquiries') renderTable();
  if(name==='analytics') setTimeout(renderAnalytics, 60);
}

// ── 통계 계산 ─────────────────────────────────────────────────
function getStats() {
  const won = inquiries.filter(i=>i.status==='수주').length;
  const lost = inquiries.filter(i=>i.status==='미수주').length;
  const pending = inquiries.filter(i=>i.status==='대기중').length;
  const decided = won + lost;
  const rate = decided > 0 ? Math.round(won/decided*100) : 0;
  const totalAmt = inquiries.filter(i=>i.status==='수주'&&i.price).reduce((s,i)=>s+Number(i.price),0);
  return { total:inquiries.length, won, lost, pending, decided, rate, totalAmt };
}

// ── 화면 렌더링 ───────────────────────────────────────────────
function renderMetrics() {
  const s = getStats();
  document.getElementById('metrics').innerHTML = `
    <div class="metric"><div class="metric-label">전체 견적 문의</div><div class="metric-value">${s.total}건</div><div class="metric-sub">누적</div></div>
    <div class="metric"><div class="metric-label">수주율</div><div class="metric-value green">${s.rate}%</div><div class="metric-sub">수주 ${s.won} / 결정 ${s.decided}건</div></div>
    <div class="metric"><div class="metric-label">대기중 (미견적)</div><div class="metric-value amber">${s.pending}건</div><div class="metric-sub">견적 입력 필요</div></div>
    <div class="metric"><div class="metric-label">수주 총액</div><div class="metric-value">${(s.totalAmt/1000000).toFixed(1)}M원</div><div class="metric-sub">누적</div></div>
  `;
}

function renderRepStats() {
  const reps = ['오지수','이승빈','박은주'];
  let html = '';
  reps.forEach((rep,i)=>{
    const mine = inquiries.filter(x=>x.rep===rep);
    const won = mine.filter(x=>x.status==='수주').length;
    const decided = won + mine.filter(x=>x.status==='미수주').length;
    const rate = decided>0?Math.round(won/decided*100):0;
    const initials = rep[0]+rep[rep.length-1];
    html += `<div class="rep-row">
      <div class="avatar ${AV[i]}">${initials}</div>
      <div class="rep-name">${rep}</div>
      <div class="rep-meta"><span>문의 <b>${mine.length}</b></span><span>수주 <b>${won}</b></span><span>미수주 <b>${mine.filter(x=>x.status==='미수주').length}</b></span></div>
      <div class="rate-wrap">
        <div class="rate-num">${rate}%</div>
        <div class="prog"><div class="prog-fill" style="width:${rate}%"></div></div>
      </div>
    </div>`;
  });
  document.getElementById('rep-stats').innerHTML = html;
}

function renderRecent() {
  const list = [...inquiries].reverse().slice(0,6); // 최신 데이터 우선 표시
  document.getElementById('recent-list').innerHTML = list.map(i=>`
    <div class="recent-item">
      <span class="badge ${STATUS_BADGE[i.status]||'b-wait'}">${i.status}</span>
      <span style="color:var(--text-secondary);min-width:35px;">${i.rep}</span>
      <span style="font-weight:500;flex:1;">${i.customer}</span>
      <span style="color:var(--text-secondary);font-size:11px;">${i.product.length>10?i.product.slice(0,10)+'…':i.product}</span>
    </div>`).join('');
}

function renderTrend() {
  if(charts['trend']) charts['trend'].destroy();
  const months=['1월','2월','3월','4월'];
  const data=months.map((_,mi)=>{
    const mo=String(mi+1).padStart(2,'0');
    // 견적일자 기준으로 필터링
    const dec=inquiries.filter(i=>i.quoteDate&&String(i.quoteDate).includes(`2026-${mo}`)&&['수주','미수주'].includes(i.status));
    const w=dec.filter(i=>i.status==='수주').length;
    return dec.length>0?Math.round(w/dec.length*100):null;
  });
  charts['trend']=new Chart(document.getElementById('trend-chart'),{
    type:'line',
    data:{labels:months,datasets:[{label:'수주율',data,borderColor:'#1D9E75',backgroundColor:'rgba(29,158,117,0.08)',tension:0.4,fill:true,pointRadius:5,pointBackgroundColor:'#1D9E75',spanGaps:true}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:0,max:100,ticks:{callback:v=>v+'%'}}}}
  });
}

function renderTable() {
  const r=document.getElementById('f-rep').value;
  const s=document.getElementById('f-status').value;
  // 역순 정렬(최신순)
  const list=[...inquiries].reverse().filter(i=>{
    if(r&&i.rep!==r)return false;
    if(s&&i.status!==s)return false;
    return true;
  });
  document.getElementById('table-count').textContent=`총 ${list.length}건`;
  document.getElementById('inq-tbody').innerHTML = list.length ? list.map(i=>`
    <tr>
      <td style="font-size:11px;color:var(--text-secondary);">${i.id}</td>
      <td style="font-size:11px;color:var(--text-secondary);white-space:nowrap;">${i.date?String(i.date).slice(0,10):'-'}</td>
      <td>${i.rep}</td>
      <td style="font-weight:500;">${i.customer}</td>
      <td style="font-size:11px;">${i.partNo||'-'}</td>
      <td style="font-size:12px;">${i.product.length>12?i.product.slice(0,12)+'…':i.product}</td>
      <td style="font-size:11px;color:var(--text-secondary);">${i.casNo||'-'}</td>
      <td style="font-size:11px;">${i.pkg||'-'}</td>
      <td style="font-size:12px;">${i.qty||'-'}</td>
      <td style="font-size:12px;">${i.price?'₩'+(Number(i.price)/10000).toFixed(0)+'만':'-'}</td>
      <td><span class="badge ${STATUS_BADGE[i.status]||'b-wait'}">${i.status}</span></td>
      <td style="display:flex;gap:5px;">
        <button class="btn btn-sm ${i.status==='대기중'?'btn-primary':''}" onclick="openQuoteModal(${i.id})">${i.status==='대기중'?'견적입력':'수정'}</button>
      </td>
    </tr>`).join('')
    : '<tr><td colspan="12" class="empty">해당하는 항목 없음</td></tr>';
}

function updateBadges() {
  const pending=inquiries.filter(i=>i.status==='대기중').length;
  document.getElementById('pending-dot').innerHTML=pending>0?`<span class="dot"></span>`:'';
  const pn=document.getElementById('pending-notif');
  if(pending>0){pn.style.display='inline-block';pn.textContent=`미처리 ${pending}건`;}
  else pn.style.display='none';
}

function renderAnalytics() {
  ['rep-chart','result-chart','rate-chart'].forEach(id=>{if(charts[id])charts[id].destroy();});
  const reps=['오지수','이승빈','박은주'];
  
  charts['rep-chart']=new Chart(document.getElementById('rep-chart'),{
    type:'doughnut',
    data:{labels:reps,datasets:[{data:reps.map(r=>inquiries.filter(i=>i.rep===r&&i.status==='수주').length),backgroundColor:['#378ADD','#1D9E75','#D85A30']}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11}}}}}
  });
  
  const won=inquiries.filter(i=>i.status==='수주').length;
  const lost=inquiries.filter(i=>i.status==='미수주').length;
  const quoted=inquiries.filter(i=>i.status==='견적완료').length;
  const wait=inquiries.filter(i=>i.status==='대기중').length;
  charts['result-chart']=new Chart(document.getElementById('result-chart'),{
    type:'bar',
    data:{labels:['수주','미수주','견적완료','대기중'],datasets:[{data:[won,lost,quoted,wait],backgroundColor:['#639922','#E24B4A','#378ADD','#BA7517']}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}
  });
  
  const rates=reps.map(r=>{
    const dec=inquiries.filter(i=>i.rep===r&&['수주','미수주'].includes(i.status));
    const w=inquiries.filter(i=>i.rep===r&&i.status==='수주').length;
    return dec.length>0?Math.round(w/dec.length*100):0;
  });
  charts['rate-chart']=new Chart(document.getElementById('rate-chart'),{
    type:'bar',
    data:{labels:reps,datasets:[{label:'수주율(%)',data:rates,backgroundColor:['#378ADD','#1D9E75','#D85A30']}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:0,max:100,ticks:{callback:v=>v+'%'}}}}
  });
}

function renderAll() {
  renderMetrics(); renderRepStats(); renderRecent(); updateBadges(); 
  setTimeout(renderTrend, 80);
}

// ── 데이터 통신 전송 (POST) ──────────────────────────────────
async function submitInquiry() {
  const rep = document.getElementById('i-rep').value;
  const customer = document.getElementById('i-customer').value.trim();
  const product = document.getElementById('i-product').value.trim();
  
  if(!customer || !product){ alert('고객사와 제품명을 입력해주세요.'); return; }

  const requestData = {
    action: 'new_inquiry', rep, customer, product,
    partNo: document.getElementById('i-partno').value.trim(),
    casNo: document.getElementById('i-casno').value.trim(),
    pkg: document.getElementById('i-pkg').value.trim(),
    qty: document.getElementById('i-qty').value.trim()
  };

  const st = document.getElementById('inq-status-text');
  document.getElementById('inq-status').classList.add('show');
  st.textContent = "데이터 전송 중 (구매팀 자동메일 발송 대기)...";

  try {
    const response = await fetch(APPS_SCRIPT_URL, {
      method: "POST", headers: { "Content-Type": "text/plain" }, body: JSON.stringify(requestData)
    });
    const result = await response.json();
    
    if(result.result === 'success') {
      st.textContent = "구글 시트 기록 및 이메일 발송 완료";
      loadDataFromSheet();
      setTimeout(() => closeModal('inq-modal'), 1500);
      
      // 입력 폼 초기화
      document.getElementById('i-customer').value = '';
      document.getElementById('i-product').value = '';
      document.getElementById('i-partno').value = '';
      document.getElementById('i-casno').value = '';
      document.getElementById('i-pkg').value = '';
      document.getElementById('i-qty').value = '';
    }
  } catch (error) { st.textContent = "통신 에러가 발생했습니다."; }
}

function openQuoteModal(id) {
  quoteTarget = id;
  const i = inquiries.find(x => x.id === id); if(!i) return;
  document.getElementById('quote-info').textContent = `ID: ${i.id} · ${i.rep} · ${i.customer} · ${i.product} · Cat No.: ${i.partNo||'-'} · ${i.pkg||''} × ${i.qty||''}`;
  document.getElementById('q-price').value = i.price || '';
  document.getElementById('q-delivery').value = i.delivery || '';
  document.getElementById('q-supplier').value = i.supplier || '';
  document.getElementById('q-result').value = i.status !== '대기중' ? i.status : '견적완료';
  document.getElementById('q-memo').value = i.memo || '';
  openModal('quote-modal');
}

async function submitQuote() {
  const i = inquiries.find(x => x.id === quoteTarget); 
  if(!i) return;
  
  const updatedData = {
    action: 'update_quote', id: i.id, rep: i.rep, customer: i.customer, product: i.product,
    price: parseInt(document.getElementById('q-price').value) || null,
    delivery: document.getElementById('q-delivery').value,
    supplier: document.getElementById('q-supplier').value,
    status: document.getElementById('q-result').value,
    memo: document.getElementById('q-memo').value
  };

  const st = document.getElementById('quote-status-text');
  document.getElementById('quote-status').classList.add('show');
  st.textContent = "구글 시트 저장 및 해당 담당자 알림 발송 중...";

  try {
    const response = await fetch(APPS_SCRIPT_URL, {
      method: "POST", headers: { "Content-Type": "text/plain" }, body: JSON.stringify(updatedData)
    });
    const result = await response.json();
    
    if(result.result === 'success') {
      st.textContent = "저장 완료 및 영업담당자 메일 전송 성공";
      loadDataFromSheet(); 
      setTimeout(() => closeModal('quote-modal'), 1500);
    }
  } catch (error) { st.textContent = "통신 에러가 발생했습니다."; }
}

// ── 초기화 ────────────────────────────────────────────────────
// 페이지 진입 시 구글 시트에서 최신 데이터를 불러옵니다.
loadDataFromSheet();
</script>
